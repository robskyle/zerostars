<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ZeroStarRating — Public Accountability Map</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0a0a0a;--red:#c0392b;--red-dark:#922b21;
  --cream:#f5f0e8;--cream-dark:#ede7d9;--gray:#6b6b6b;--gray-light:#e8e4dc;
}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--black)}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:500;background:var(--black);padding:0 1rem;height:52px;display:flex;align-items:center;gap:1rem}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:white;font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;flex-shrink:0}
.logo img{width:36px;height:36px;object-fit:contain;flex-shrink:0}
.logo .red{color:var(--red)}
.hint{font-size:0.8rem;color:var(--red);font-family:'DM Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
@media(max-width:480px){.hint{display:none}}

/* FLASHING BANNER */
.flash-banner{
  position:fixed;top:52px;left:0;right:0;z-index:499;
  background:var(--red);color:white;
  text-align:center;padding:5px 1rem;
  font-family:'Syne',sans-serif;font-weight:800;font-size:0.82rem;
  letter-spacing:0.08em;text-transform:uppercase;
}

/* FULL SCREEN MAP */
#map{position:fixed;top:87px;left:0;right:0;bottom:0;z-index:1;cursor:crosshair}

/* Leaflet geocoder overrides */
.leaflet-control-geocoder{background:white;border-radius:6px!important;box-shadow:0 2px 12px rgba(0,0,0,0.25)!important;border:none!important}
.leaflet-control-geocoder-form input{font-family:'DM Sans',sans-serif;font-size:0.88rem;padding:9px 12px;border:none;outline:none;min-width:220px}
.leaflet-control-geocoder-alternatives{border-radius:0 0 6px 6px;border-top:1px solid var(--gray-light)}
.leaflet-control-geocoder-alternatives li a{font-size:0.82rem;padding:8px 12px;font-family:'DM Sans',sans-serif}

/* RIGHT-CLICK CONTEXT MENU */
#ctx-menu{position:fixed;background:white;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.25);padding:4px 0;z-index:1000;min-width:180px;display:none}
#ctx-menu button{display:flex;align-items:center;gap:8px;width:100%;padding:10px 14px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:0.88rem;cursor:pointer;color:var(--black)}
#ctx-menu button:hover{background:var(--cream)}
#ctx-menu .ctx-red{color:var(--red);font-weight:600}

/* MODAL OVERLAY */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:900;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
@media(min-width:600px){.modal-overlay{align-items:center}}
.modal{background:white;border-radius:16px 16px 0 0;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;display:flex;flex-direction:column}
@media(min-width:600px){.modal{border-radius:12px;margin:1rem}}
.modal-head{padding:1.25rem 1.25rem 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-head h3{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem}
.modal-close{background:var(--gray-light);border:none;cursor:pointer;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.9rem;flex-shrink:0}
.modal-coords{font-size:0.7rem;font-family:'DM Mono',monospace;color:var(--gray);padding:0.5rem 1.25rem 0.75rem;border-bottom:1px solid var(--gray-light);flex-shrink:0}
.modal-body{padding:1rem 1.25rem 1.5rem;display:flex;flex-direction:column;gap:0.85rem}
.field label{display:block;font-size:0.75rem;font-weight:600;font-family:'Syne',sans-serif;text-transform:uppercase;letter-spacing:0.05em;color:var(--gray);margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;border:1.5px solid var(--gray-light);border-radius:6px;padding:9px 12px;font-size:0.9rem;font-family:'DM Sans',sans-serif;outline:none;background:white;color:var(--black)}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--red)}
.field textarea{resize:vertical;min-height:80px}

/* Photo upload */
.photo-drop{border:2px dashed var(--gray-light);border-radius:8px;padding:1.25rem;text-align:center;cursor:pointer;transition:border-color 0.15s;position:relative}
.photo-drop:hover,.photo-drop.drag{border-color:var(--red)}
.photo-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.photo-drop i{font-size:1.75rem;color:var(--gray);display:block;margin-bottom:4px}
.photo-drop span{font-size:0.8rem;color:var(--gray)}
.photo-drop .geo-tag{font-size:0.7rem;font-family:'DM Mono',monospace;color:var(--red);margin-top:4px;display:none}
.photo-preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:0.5rem}
.photo-thumb{position:relative;width:72px;height:72px;border-radius:6px;overflow:hidden;flex-shrink:0}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-thumb .geo-badge{position:absolute;bottom:2px;left:2px;background:var(--red);color:white;font-size:9px;padding:1px 4px;border-radius:3px;font-family:'DM Mono',monospace}
.photo-thumb .remove-photo{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.5);color:white;border:none;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}

.btn-row{display:flex;gap:8px;margin-top:0.25rem}
.btn{font-family:'Syne',sans-serif;font-weight:700;font-size:0.82rem;padding:11px 18px;border-radius:6px;border:none;cursor:pointer;text-transform:uppercase;letter-spacing:0.05em;flex:1}
.btn-red{background:var(--red);color:white}.btn-red:hover{background:var(--red-dark)}
.btn-ghost{background:var(--gray-light);color:var(--black)}.btn-ghost:hover{background:var(--cream-dark)}

/* PIN POPUP */
.pin-popup{position:fixed;left:0;right:0;bottom:-100%;background:white;border-radius:14px 14px 0 0;z-index:800;padding:1.25rem;box-shadow:0 -4px 24px rgba(0,0,0,0.18);transition:bottom 0.28s cubic-bezier(0.32,0.72,0,1)}
.pin-popup.show{bottom:0}
.popup-handle{width:36px;height:4px;background:var(--gray-light);border-radius:2px;margin:0 auto 1rem}
.popup-close-btn{position:absolute;top:1rem;right:1rem;background:var(--gray-light);border:none;cursor:pointer;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.9rem}
.popup-cat{display:inline-block;font-size:0.65rem;font-family:'DM Mono',monospace;padding:3px 8px;border-radius:3px;background:var(--red);color:white;text-transform:uppercase;margin-bottom:0.5rem}
.popup-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;margin-bottom:4px}
.popup-desc{font-size:0.83rem;line-height:1.5;color:#444;margin-bottom:0.75rem}
.popup-photos{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:0.75rem}
.popup-photos img{width:64px;height:64px;object-fit:cover;border-radius:6px;cursor:pointer}
.popup-coords{font-size:0.68rem;font-family:'DM Mono',monospace;color:#aaa}
@media(min-width:600px){
  .pin-popup{position:fixed;left:auto;bottom:1rem!important;right:320px;width:290px;border-radius:12px;max-height:calc(100vh - 80px);overflow-y:auto}
}

/* LEAFLET PINS */
.zs-pin{display:inline-flex;align-items:center;gap:4px;background:var(--red);color:white;border-radius:4px 4px 4px 0;padding:4px 8px;font-size:0.7rem;font-family:'Syne',sans-serif;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,0.3);white-space:nowrap;cursor:pointer;position:relative}
.zs-pin::after{content:'';position:absolute;bottom:-6px;left:0;border:3px solid transparent;border-top-color:var(--red);border-right-color:var(--red)}

/* LIGHTBOX */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:2000;display:none;align-items:center;justify-content:center}
#lightbox.show{display:flex}
#lightbox img{max-width:90vw;max-height:90vh;border-radius:6px;object-fit:contain}
#lightbox-close{position:absolute;top:1rem;right:1rem;background:rgba(255,255,255,0.15);color:white;border:none;border-radius:50%;width:36px;height:36px;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ── FLOATING PIN SEARCH PANEL (lower-right) ────────────────────────── */
#pinSearchPanel{
  position:fixed;bottom:1.25rem;right:1rem;z-index:700;
  background:white;border-radius:10px;
  box-shadow:0 4px 24px rgba(0,0,0,0.28);
  width:290px;padding:13px 14px 11px;
  max-height:calc(100vh - 80px);overflow-y:auto;
}
.ps-title{font-family:'Syne',sans-serif;font-weight:800;font-size:0.78rem;
  text-transform:uppercase;letter-spacing:0.07em;color:var(--black);
  margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ps-title i{color:var(--red)}
.ps-field{margin-bottom:8px}
.ps-label{font-size:0.64rem;font-family:'DM Mono',monospace;text-transform:uppercase;
  letter-spacing:0.07em;color:var(--gray);margin-bottom:4px;display:block}
.ps-input{width:100%;border:1.5px solid var(--gray-light);border-radius:6px;
  padding:7px 10px;font-size:0.85rem;font-family:'DM Sans',sans-serif;
  outline:none;color:var(--black);background:white;transition:border-color 0.15s}
.ps-input:focus{border-color:var(--red)}
.ps-input.ps-error{border-color:#e53e3e!important;background:#fff5f5}
.ps-required-msg{font-size:0.68rem;color:#e53e3e;font-family:'DM Mono',monospace;margin-top:3px;display:none}
.ps-required-msg.show{display:block}
.ps-btn{width:100%;margin-top:4px;padding:8px;background:var(--red);color:white;
  border:none;border-radius:6px;font-family:'Syne',sans-serif;font-weight:700;
  font-size:0.76rem;text-transform:uppercase;letter-spacing:0.06em;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px}
.ps-btn:hover{background:var(--red-dark)}

/* Results area */
#psResults{margin-top:9px;display:none}
#psResults.show{display:block}
.ps-divider{border:none;border-top:1px solid var(--gray-light);margin:0 0 8px}

/* Spelling suggestion */
.ps-suggest-box{background:#fef9f0;border:1.5px solid #f0c060;border-radius:7px;
  padding:8px 10px;margin-bottom:8px;font-size:0.78rem;color:#555}
.ps-suggest-box strong{color:var(--black)}
.ps-suggest-pills{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.ps-pill{display:inline-block;background:white;border:1.5px solid var(--red);
  color:var(--red);border-radius:4px;padding:2px 9px;font-size:0.74rem;
  cursor:pointer;font-weight:700;font-family:'DM Mono',monospace;transition:all 0.12s}
.ps-pill:hover{background:var(--red);color:white}

/* Result items */
.ps-section-lbl{font-size:0.65rem;font-family:'DM Mono',monospace;text-transform:uppercase;
  letter-spacing:0.07em;color:#aaa;margin-bottom:6px}
.ps-result{border:1.5px solid var(--gray-light);border-radius:7px;padding:8px 10px;
  margin-bottom:6px;cursor:pointer;transition:border-color 0.12s,background 0.12s}
.ps-result:hover{border-color:var(--red);background:var(--cream)}
.ps-result:last-child{margin-bottom:0}
.ps-result-name{font-family:'Syne',sans-serif;font-weight:700;font-size:0.83rem}
.ps-result-addr{font-size:0.71rem;color:var(--gray);font-family:'DM Mono',monospace;margin-top:2px}
.ps-result-cat{display:inline-block;font-size:0.6rem;font-family:'DM Mono',monospace;
  padding:1px 6px;border-radius:3px;background:var(--red);color:white;
  text-transform:uppercase;margin-top:3px}
.ps-no-match{font-size:0.8rem;color:var(--gray);text-align:center;
  padding:6px 0;font-style:italic}

@media(max-width:380px){
  #pinSearchPanel{width:calc(100vw - 2rem);right:1rem}
}
@media(max-width:599px){
  /* on mobile, panel sits above bottom edge and popup goes full-width */
  #pinSearchPanel{bottom:1rem}
}
</style>
</head>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let map, ctxLatLng = null;
const userPins = [];
let pendingPhotos = [];

// ── Seed pins (with city + address) ───────────────────────────────────────
const seedPins = [];

// ── Map init ───────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  map = L.map('map', {zoomControl:true}).setView([20, 0], 2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom:19
  }).addTo(map);

  // OSM Geocoder for map navigation
  L.Control.geocoder({
    defaultMarkGeocode: false,
    placeholder: 'Search map address…',
    geocoder: L.Control.Geocoder.nominatim(),
    position: 'topleft',
    collapsed: false,
    errorMessage: 'Not found'
  }).on('markgeocode', e => {
    const bb = e.geocode.bbox;
    map.fitBounds([[bb.getSouthWest().lat, bb.getSouthWest().lng],[bb.getNorthEast().lat, bb.getNorthEast().lng]]);
  }).addTo(map);

  seedPins.forEach(p => addPinToMap(p));

  // Right-click
  map.on('contextmenu', e => {
    e.originalEvent.preventDefault();
    ctxLatLng = e.latlng;
    showCtxMenu(e.originalEvent.clientX, e.originalEvent.clientY);
  });
  map.on('click', () => { closeCtxMenu(); closePopup(); });

  // Long-press mobile
  let pressTimer;
  map.on('mousedown touchstart', e => {
    const orig = e.originalEvent;
    if (orig.touches && orig.touches.length > 1) return;
    pressTimer = setTimeout(() => {
      if (e.latlng) {
        ctxLatLng = e.latlng;
        const t = orig.touches ? orig.touches[0] : orig;
        showCtxMenu(t.clientX, t.clientY);
      }
    }, 600);
  });
  map.on('mouseup touchend mousemove touchmove', () => clearTimeout(pressTimer));
  document.addEventListener('click', e => {
    if (!document.getElementById('ctx-menu').contains(e.target)) closeCtxMenu();
  });
});

// ── Context menu ───────────────────────────────────────────────────────────
function showCtxMenu(x, y) {
  const menu = document.getElementById('ctx-menu');
  menu.style.display = 'block';
  const mw = menu.offsetWidth||180, mh = menu.offsetHeight||80;
  menu.style.left = Math.min(x, window.innerWidth - mw - 8) + 'px';
  menu.style.top  = Math.min(y, window.innerHeight - mh - 8) + 'px';
}
function closeCtxMenu() { document.getElementById('ctx-menu').style.display = 'none'; }

// ── Add pin modal ──────────────────────────────────────────────────────────
function openAddPin() {
  closeCtxMenu();
  if (!ctxLatLng) return;
  document.getElementById('modalCoords').textContent =
    `📍 ${ctxLatLng.lat.toFixed(5)}, ${ctxLatLng.lng.toFixed(5)}`;
  ['pinName','pinAddress','pinCity','pinState','pinDesc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('pinCat').value = 'Employer';
  document.getElementById('photoPreview').innerHTML = '';
  document.getElementById('geoTagMsg').style.display = 'none';
  pendingPhotos = [];
  document.getElementById('addModal').classList.add('show');
  setTimeout(() => document.getElementById('pinName').focus(), 200);
}
function closeModal() { document.getElementById('addModal').classList.remove('show'); }

// ── Photo handling + EXIF geo ──────────────────────────────────────────────
function handlePhotos(files) {
  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const dataUrl = e.target.result;
      extractExifGeo(file, (lat, lng) => {
        const hasGeo = lat !== null;
        pendingPhotos.push({dataUrl, lat, lng, hasGeo});
        renderPhotoPreview();
        if (hasGeo) {
          const msg = document.getElementById('geoTagMsg');
          msg.textContent = `📍 GPS found in photo: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
          msg.style.display = 'block';
        }
      });
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('photoInput').value = '';
}

function extractExifGeo(file, cb) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const view = new DataView(e.target.result);
      if (view.getUint16(0) !== 0xFFD8) { cb(null,null); return; }
      let offset = 2;
      while (offset < view.byteLength - 2) {
        if (view.getUint16(offset) === 0xFFE1) {
          const exifOffset = offset + 4;
          const exifStr = String.fromCharCode(...new Uint8Array(e.target.result, exifOffset, 4));
          if (exifStr === 'Exif') {
            const tiffOffset = exifOffset + 6;
            const bigEndian = view.getUint16(tiffOffset) === 0x4D4D;
            const getU16 = o => bigEndian ? view.getUint16(o) : view.getUint16(o, true);
            const getU32 = o => bigEndian ? view.getUint32(o) : view.getUint32(o, true);
            const ifdOffset = tiffOffset + getU32(tiffOffset + 4);
            const entryCount = getU16(ifdOffset);
            let gpsOff = null;
            for (let i = 0; i < entryCount; i++) {
              const eo = ifdOffset + 2 + i * 12;
              if (getU16(eo) === 0x8825) { gpsOff = tiffOffset + getU32(eo + 8); break; }
            }
            if (!gpsOff) { cb(null,null); return; }
            const gpsCount = getU16(gpsOff);
            const gd = {};
            for (let i = 0; i < gpsCount; i++) {
              const eo = gpsOff + 2 + i * 12;
              const tag = getU16(eo), type = getU16(eo+2), count = getU32(eo+4);
              const vo = tiffOffset + getU32(eo+8);
              if (type === 5 && count === 3) {
                const deg = getU32(vo)/getU32(vo+4);
                const min = getU32(vo+8)/getU32(vo+12);
                const sec = getU32(vo+16)/getU32(vo+20);
                gd[tag] = deg + min/60 + sec/3600;
              } else if (type === 2) {
                gd['ref'+tag] = String.fromCharCode(view.getUint8(eo+8));
              }
            }
            if (gd[2] !== undefined && gd[4] !== undefined) {
              cb(gd['ref1']==='S' ? -gd[2] : gd[2], gd['ref3']==='W' ? -gd[4] : gd[4]);
              return;
            }
          }
        }
        offset += 2 + view.getUint16(offset + 2);
      }
    } catch(_){}
    cb(null,null);
  };
  reader.readAsArrayBuffer(file);
}

// ══════════════════════════════════════════════════════════════════════════════
// PIN SEARCH — two-field, fuzzy match, spelling suggestions, duplicate handling
// ══════════════════════════════════════════════════════════════════════════════

// Levenshtein distance (case-insensitive)
function lev(a, b) {
  a = a.toLowerCase(); b = b.toLowerCase();
  const m = a.length, n = b.length;
  const dp = Array.from({length:m+1}, (_,i) => Array.from({length:n+1}, (_,j) => i===0?j:j===0?i:0));
  for (let i=1;i<=m;i++) for (let j=1;j<=n;j++)
    dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

// Returns true if query is "close enough" to target (for suggestion threshold)
function isFuzzyClose(query, target) {
  if (!query) return false;
  const q = query.toLowerCase(), t = target.toLowerCase();
  if (t.includes(q) || q.includes(t)) return true;
  // Levenshtein threshold scales with word length
  const threshold = Math.max(1, Math.floor(Math.min(q.length, t.length) / 3));
  return lev(q, t) <= threshold;
}

// Best fuzzy match score — lower = better
function fuzzyScore(query, target) {
  if (!query) return Infinity;
  const q = query.toLowerCase(), t = target.toLowerCase();
  if (t === q) return 0;
  if (t.startsWith(q)) return 0.1;
  if (t.includes(q)) return 0.5;
  return lev(q, t);
}

// ── US States list ─────────────────────────────────────────────────────────
const US_STATES = [
  'Alabama','Alaska','Arizona','Arkansas','California','Colorado','Connecticut',
  'Delaware','Florida','Georgia','Hawaii','Idaho','Illinois','Indiana','Iowa',
  'Kansas','Kentucky','Louisiana','Maine','Maryland','Massachusetts','Michigan',
  'Minnesota','Mississippi','Missouri','Montana','Nebraska','Nevada',
  'New Hampshire','New Jersey','New Mexico','New York','North Carolina',
  'North Dakota','Ohio','Oklahoma','Oregon','Pennsylvania','Rhode Island',
  'South Carolina','South Dakota','Tennessee','Texas','Utah','Vermont',
  'Virginia','Washington','West Virginia','Wisconsin','Wyoming','Washington DC'
];
// Abbreviation map
const STATE_ABBR = {
  AL:'Alabama',AK:'Alaska',AZ:'Arizona',AR:'Arkansas',CA:'California',
  CO:'Colorado',CT:'Connecticut',DE:'Delaware',FL:'Florida',GA:'Georgia',
  HI:'Hawaii',ID:'Idaho',IL:'Illinois',IN:'Indiana',IA:'Iowa',KS:'Kansas',
  KY:'Kentucky',LA:'Louisiana',ME:'Maine',MD:'Maryland',MA:'Massachusetts',
  MI:'Michigan',MN:'Minnesota',MS:'Mississippi',MO:'Missouri',MT:'Montana',
  NE:'Nebraska',NV:'Nevada',NH:'New Hampshire',NJ:'New Jersey',NM:'New Mexico',
  NY:'New York',NC:'North Carolina',ND:'North Dakota',OH:'Ohio',OK:'Oklahoma',
  OR:'Oregon',PA:'Pennsylvania',RI:'Rhode Island',SC:'South Carolina',
  SD:'South Dakota',TN:'Tennessee',TX:'Texas',UT:'Utah',VT:'Vermont',
  VA:'Virginia',WA:'Washington',WV:'West Virginia',WI:'Wisconsin',WY:'Wyoming',
  DC:'Washington DC'
};

function normalizeState(s) {
  if (!s) return '';
  const u = s.trim().toUpperCase();
  if (STATE_ABBR[u]) return STATE_ABBR[u];
  return s.trim();
}

// ── State autocomplete dropdown ────────────────────────────────────────────
function onPsStateInput() {
  const q = document.getElementById('psState').value.trim();
  const dd = document.getElementById('psStateDropdown');
  if (!q) { dd.style.display = 'none'; return; }
  const norm = normalizeState(q).toLowerCase();
  const matches = US_STATES.filter(s => s.toLowerCase().includes(norm) || s.toLowerCase().startsWith(q.toLowerCase()));
  if (!matches.length) { dd.style.display = 'none'; return; }
  dd.innerHTML = matches.slice(0,8).map(s =>
    `<div style="padding:7px 10px;font-size:0.84rem;font-family:'DM Sans',sans-serif;cursor:pointer;border-bottom:1px solid var(--gray-light)" onmousedown="pickState('${s}')" onmouseover="this.style.background='var(--cream)'" onmouseout="this.style.background=''">${s}</div>`
  ).join('');
  dd.style.display = 'block';
}
function pickState(s) {
  document.getElementById('psState').value = s;
  document.getElementById('psStateDropdown').style.display = 'none';
}
document.addEventListener('click', e => {
  if (!document.getElementById('psState').contains(e.target))
    document.getElementById('psStateDropdown').style.display = 'none';
});

// ── Live input: clear results only if required fields go empty ─────────────
function onPsLive() {
  const c = document.getElementById('psCity').value.trim();
  const s = document.getElementById('psState').value.trim();
  if (!c && !s) hidePsResults();
}

// ── Clear error on a field ─────────────────────────────────────────────────
function clearPsError(fieldId) {
  document.getElementById(fieldId).classList.remove('ps-error');
  const errId = fieldId === 'psCity' ? 'psCityErr' : fieldId === 'psState' ? 'psStateErr' : null;
  if (errId) document.getElementById(errId).classList.remove('show');
}

// ── Run search ─────────────────────────────────────────────────────────────
function runPinSearch() {
  const rawName  = document.getElementById('psName').value.trim();
  const rawCity  = document.getElementById('psCity').value.trim();
  const rawState = normalizeState(document.getElementById('psState').value.trim());
  const rawCat   = document.getElementById('psCat').value;

  // City and State are required
  let hasError = false;
  if (!rawCity) {
    document.getElementById('psCity').classList.add('ps-error');
    document.getElementById('psCityErr').classList.add('show');
    hasError = true;
  }
  if (!rawState) {
    document.getElementById('psState').classList.add('ps-error');
    document.getElementById('psStateErr').classList.add('show');
    hasError = true;
  }
  if (hasError) return;

  const exactMatches = userPins.filter(p => {
    const nameOk  = !rawName  || p.title.toLowerCase().includes(rawName.toLowerCase());
    const cityOk  = !rawCity  || (p.city||'').toLowerCase().includes(rawCity.toLowerCase());
    const stateOk = !rawState || (p.state||'').toLowerCase().includes(rawState.toLowerCase());
    const catOk   = !rawCat   || p.cat === rawCat;
    return nameOk && cityOk && stateOk && catOk;
  });

  const allNames  = [...new Set(userPins.map(p => p.title))];
  const allCities = [...new Set(userPins.map(p => p.city).filter(Boolean))];
  const allStates = [...new Set(userPins.map(p => p.state).filter(Boolean))];

  let nameSuggestions = [], citySuggestions = [], stateSuggestions = [];

  if (!exactMatches.length) {
    if (rawName) {
      nameSuggestions = allNames
        .filter(n => isFuzzyClose(rawName, n) && !n.toLowerCase().includes(rawName.toLowerCase()))
        .sort((a,b) => fuzzyScore(rawName,a) - fuzzyScore(rawName,b)).slice(0,3);
    }
    if (rawCity) {
      citySuggestions = allCities
        .filter(c => isFuzzyClose(rawCity, c) && !c.toLowerCase().includes(rawCity.toLowerCase()))
        .sort((a,b) => fuzzyScore(rawCity,a) - fuzzyScore(rawCity,b)).slice(0,3);
    }
    if (rawState) {
      stateSuggestions = allStates
        .filter(s => isFuzzyClose(rawState, s) && !s.toLowerCase().includes(rawState.toLowerCase()))
        .sort((a,b) => fuzzyScore(rawState,a) - fuzzyScore(rawState,b)).slice(0,3);
    }
  }

  renderPsResults(exactMatches, nameSuggestions, citySuggestions, stateSuggestions, rawName, rawCity, rawState, rawCat);
}

// ── Render results ─────────────────────────────────────────────────────────
function renderPsResults(matches, nameSugs, citySugs, stateSugs, rawName, rawCity, rawState, rawCat) {
  const box = document.getElementById('psResults');
  let html = '<hr class="ps-divider">';

  // Spelling suggestions (only when zero results)
  if (!matches.length && (nameSugs.length || citySugs.length || stateSugs.length)) {
    html += '<div class="ps-suggest-box"><strong>Did you mean?</strong>';
    if (nameSugs.length) {
      html += '<div style="margin-top:5px;font-size:0.73rem;color:#777">Location name:</div>';
      html += '<div class="ps-suggest-pills">' +
        nameSugs.map(s => `<span class="ps-pill" onclick="fillNameSuggestion('${s.replace(/'/g,"\\'")}')">${s}</span>`).join('') + '</div>';
    }
    if (citySugs.length) {
      html += '<div style="margin-top:6px;font-size:0.73rem;color:#777">Town / City:</div>';
      html += '<div class="ps-suggest-pills">' +
        citySugs.map(s => `<span class="ps-pill" onclick="fillCitySuggestion('${s.replace(/'/g,"\\'")}')">${s}</span>`).join('') + '</div>';
    }
    if (stateSugs.length) {
      html += '<div style="margin-top:6px;font-size:0.73rem;color:#777">US State:</div>';
      html += '<div class="ps-suggest-pills">' +
        stateSugs.map(s => `<span class="ps-pill" onclick="fillStateSuggestion('${s.replace(/'/g,"\\'")}')">${s}</span>`).join('') + '</div>';
    }
    html += '</div>';
  }

  if (matches.length) {
    const locLabel = [rawCity, rawState].filter(Boolean).join(', ');

    if (!rawName) {
      // ── AREA BROWSE MODE ──────────────────────────────────────────────
      // No name typed — show every matching pin in this city/state/category
      const catLabel = rawCat ? ` · ${rawCat}` : ' · All Categories';
      html += `<div class="ps-section-lbl">${matches.length} location${matches.length>1?'s':''} in ${esc(locLabel)}${esc(catLabel)}</div>`;

      // Sort by category then name
      const sorted = [...matches].sort((a,b) =>
        a.cat.localeCompare(b.cat) || a.title.localeCompare(b.title)
      );

      let lastCat = null;
      sorted.forEach(p => {
        const idx = userPins.indexOf(p);
        // Category section header (only when showing all categories)
        if (!rawCat && p.cat !== lastCat) {
          html += `<div style="font-size:0.62rem;font-family:'DM Mono',monospace;text-transform:uppercase;
            letter-spacing:0.08em;color:var(--red);font-weight:700;
            margin:${lastCat ? '10px' : '0'} 0 5px">${esc(p.cat)}</div>`;
          lastCat = p.cat;
        }
        const snippet = (p.desc||'').slice(0, 72) + ((p.desc||'').length > 72 ? '…' : '');
        html += `<div class="ps-result" onclick="selectPin(${idx})">
          <div class="ps-result-name">${esc(p.title)}</div>
          ${p.address ? `<div class="ps-result-addr"><i class="ti ti-map-pin" style="font-size:10px"></i> ${esc(p.address)}</div>` : ''}
          ${snippet ? `<div style="font-size:0.72rem;color:#777;margin-top:3px;line-height:1.4">${esc(snippet)}</div>` : ''}
          ${rawCat ? '' : ''}
        </div>`;
      });

    } else {
      // ── NAME SEARCH MODE ──────────────────────────────────────────────
      // Name was typed — group pins that share the same name+location (duplicates by address)
      html += `<div class="ps-section-lbl">${matches.length} result${matches.length>1?'s':''} found in ${esc(locLabel)}</div>`;

      const groups = {};
      matches.forEach(p => {
        const key = (p.title + '|' + (p.city||'') + '|' + (p.state||'')).toLowerCase();
        if (!groups[key]) groups[key] = [];
        groups[key].push(p);
      });

      Object.values(groups).forEach(group => {
        if (group.length === 1) {
          const p = group[0];
          const idx = userPins.indexOf(p);
          html += `<div class="ps-result" onclick="selectPin(${idx})">
            <div class="ps-result-name">${esc(p.title)}</div>
            ${p.address ? `<div class="ps-result-addr"><i class="ti ti-map-pin" style="font-size:10px"></i> ${esc(p.address)}</div>` : ''}
            <span class="ps-result-cat">${esc(p.cat)}</span>
          </div>`;
        } else {
          // Same name at multiple addresses in same area
          const first = group[0];
          html += `<div style="font-family:'Syne',sans-serif;font-weight:800;font-size:0.83rem;
            margin-bottom:5px;color:var(--black)">
            ${esc(first.title)}
            <span style="font-size:0.68rem;color:var(--gray);font-family:'DM Mono',monospace;
              font-weight:400;margin-left:6px">${group.length} locations</span>
          </div>`;
          group.forEach(p => {
            const idx = userPins.indexOf(p);
            const addrLine = p.address || `${p.lat.toFixed(4)}, ${p.lng.toFixed(4)}`;
            html += `<div class="ps-result" style="margin-left:8px" onclick="selectPin(${idx})">
              <div class="ps-result-addr" style="font-size:0.78rem;color:var(--black)">
                <i class="ti ti-map-pin" style="font-size:10px;color:var(--red)"></i> ${esc(addrLine)}
              </div>
              <span class="ps-result-cat">${esc(p.cat)}</span>
            </div>`;
          });
        }
      });
    }

  } else if (!nameSugs.length && !citySugs.length && !stateSugs.length) {
    const locLabel = [rawCity, rawState].filter(Boolean).join(', ');
    const catLabel = rawCat ? ` in category "${rawCat}"` : '';
    html += `<div class="ps-no-match">No pinned locations found in ${esc(locLabel)}${esc(catLabel)}.</div>`;
  }

  box.innerHTML = html;
  box.classList.add('show');
}

function fillNameSuggestion(name)   { document.getElementById('psName').value = name;  runPinSearch(); }
function fillCitySuggestion(city)   { document.getElementById('psCity').value = city;  runPinSearch(); }
function fillStateSuggestion(state) { document.getElementById('psState').value = state; runPinSearch(); }

function selectPin(idx) {
  const pin = userPins[idx];
  if (!pin) return;
  map.flyTo([pin.lat, pin.lng], Math.max(map.getZoom(), 13), {duration:0.7});
  setTimeout(() => showPinPopup(pin), 750);
}

function hidePsResults() {
  const box = document.getElementById('psResults');
  box.classList.remove('show');
  box.innerHTML = '';
}

document.getElementById('psName').addEventListener('keydown',  e => { if(e.key==='Enter') runPinSearch(); });
document.getElementById('psCity').addEventListener('keydown',  e => { if(e.key==='Enter') runPinSearch(); });
document.getElementById('psState').addEventListener('keydown', e => { if(e.key==='Enter'){ document.getElementById('psStateDropdown').style.display='none'; runPinSearch(); }});
document.getElementById('psCat').addEventListener('change', () => { if(document.getElementById('psCity').value.trim() && document.getElementById('psState').value.trim()) runPinSearch(); });

// Escape helper
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
