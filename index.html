<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ZeroStars — Public Accountability Map</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0a0a0a;--red:#c0392b;--red-dark:#922b21;
  --cream:#f5f0e8;--cream-dark:#ede7d9;--gray:#6b6b6b;--gray-light:#e8e4dc;
}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--black)}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:500;background:var(--black);padding:0 1rem;height:52px;display:flex;align-items:center;gap:1rem}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:white;font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;flex-shrink:0}
.logo .red{color:var(--red)}
.hint{font-size:0.72rem;color:#555;font-family:'DM Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@media(max-width:480px){.hint{display:none}}

/* FULL SCREEN MAP */
#map{position:fixed;top:52px;left:0;right:0;bottom:0;z-index:1;cursor:crosshair}

/* Leaflet geocoder overrides */
.leaflet-control-geocoder{background:white;border-radius:6px!important;box-shadow:0 2px 12px rgba(0,0,0,0.25)!important;border:none!important}
.leaflet-control-geocoder-form input{font-family:'DM Sans',sans-serif;font-size:0.88rem;padding:9px 12px;border:none;outline:none;min-width:220px}
.leaflet-control-geocoder-alternatives{border-radius:0 0 6px 6px;border-top:1px solid var(--gray-light)}
.leaflet-control-geocoder-alternatives li a{font-size:0.82rem;padding:8px 12px;font-family:'DM Sans',sans-serif}

/* RIGHT-CLICK CONTEXT MENU */
#ctx-menu{position:fixed;background:white;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.25);padding:4px 0;z-index:1000;min-width:180px;display:none}
#ctx-menu button{display:flex;align-items:center;gap:8px;width:100%;padding:10px 14px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:0.88rem;cursor:pointer;color:var(--black)}
#ctx-menu button:hover{background:var(--cream)}
#ctx-menu .ctx-red{color:var(--red);font-weight:600}

/* MODAL OVERLAY */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:900;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
@media(min-width:600px){.modal-overlay{align-items:center}}

.modal{background:white;border-radius:16px 16px 0 0;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;display:flex;flex-direction:column}
@media(min-width:600px){.modal{border-radius:12px;margin:1rem}}

.modal-head{padding:1.25rem 1.25rem 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-head h3{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem}
.modal-close{background:var(--gray-light);border:none;cursor:pointer;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.9rem;flex-shrink:0}
.modal-coords{font-size:0.7rem;font-family:'DM Mono',monospace;color:var(--gray);padding:0 1.25rem 0.75rem;border-bottom:1px solid var(--gray-light);flex-shrink:0}

.modal-body{padding:1rem 1.25rem 1.5rem;display:flex;flex-direction:column;gap:0.85rem}

.field label{display:block;font-size:0.75rem;font-weight:600;font-family:'Syne',sans-serif;text-transform:uppercase;letter-spacing:0.05em;color:var(--gray);margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;border:1.5px solid var(--gray-light);border-radius:6px;padding:9px 12px;font-size:0.9rem;font-family:'DM Sans',sans-serif;outline:none;background:white;color:var(--black)}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--red)}
.field textarea{resize:vertical;min-height:80px}

/* Photo upload */
.photo-drop{border:2px dashed var(--gray-light);border-radius:8px;padding:1.25rem;text-align:center;cursor:pointer;transition:border-color 0.15s;position:relative}
.photo-drop:hover,.photo-drop.drag{border-color:var(--red)}
.photo-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.photo-drop i{font-size:1.75rem;color:var(--gray);display:block;margin-bottom:4px}
.photo-drop span{font-size:0.8rem;color:var(--gray)}
.photo-drop .geo-tag{font-size:0.7rem;font-family:'DM Mono',monospace;color:var(--red);margin-top:4px;display:none}

.photo-preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:0.5rem}
.photo-thumb{position:relative;width:72px;height:72px;border-radius:6px;overflow:hidden;flex-shrink:0}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-thumb .geo-badge{position:absolute;bottom:2px;left:2px;background:var(--red);color:white;font-size:9px;padding:1px 4px;border-radius:3px;font-family:'DM Mono',monospace}
.photo-thumb .remove-photo{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.5);color:white;border:none;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}

.btn-row{display:flex;gap:8px;margin-top:0.25rem}
.btn{font-family:'Syne',sans-serif;font-weight:700;font-size:0.82rem;padding:11px 18px;border-radius:6px;border:none;cursor:pointer;text-transform:uppercase;letter-spacing:0.05em;flex:1}
.btn-red{background:var(--red);color:white}
.btn-red:hover{background:var(--red-dark)}
.btn-ghost{background:var(--gray-light);color:var(--black)}
.btn-ghost:hover{background:var(--cream-dark)}

/* PIN POPUP (click on pin) */
.pin-popup{position:fixed;left:0;right:0;bottom:-100%;background:white;border-radius:14px 14px 0 0;z-index:800;padding:1.25rem;box-shadow:0 -4px 24px rgba(0,0,0,0.18);transition:bottom 0.28s cubic-bezier(0.32,0.72,0,1)}
.pin-popup.show{bottom:0}
.popup-handle{width:36px;height:4px;background:var(--gray-light);border-radius:2px;margin:0 auto 1rem}
.popup-close-btn{position:absolute;top:1rem;right:1rem;background:var(--gray-light);border:none;cursor:pointer;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.9rem}
.popup-cat{display:inline-block;font-size:0.65rem;font-family:'DM Mono',monospace;padding:3px 8px;border-radius:3px;background:var(--red);color:white;text-transform:uppercase;margin-bottom:0.5rem}
.popup-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;margin-bottom:4px}
.popup-desc{font-size:0.83rem;line-height:1.5;color:#444;margin-bottom:0.75rem}
.popup-photos{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:0.75rem}
.popup-photos img{width:64px;height:64px;object-fit:cover;border-radius:6px;cursor:pointer}
.popup-coords{font-size:0.68rem;font-family:'DM Mono',monospace;color:#aaa}
@media(min-width:600px){
  .pin-popup{position:fixed;left:auto;bottom:1rem!important;right:1rem;width:300px;border-radius:12px;max-height:calc(100vh - 80px);overflow-y:auto}
}

/* LEAFLET PINS */
.zs-pin{display:inline-flex;align-items:center;gap:4px;background:var(--red);color:white;border-radius:4px 4px 4px 0;padding:4px 8px;font-size:0.7rem;font-family:'Syne',sans-serif;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,0.3);white-space:nowrap;cursor:pointer;position:relative}
.zs-pin::after{content:'';position:absolute;bottom:-6px;left:0;border:3px solid transparent;border-top-color:var(--red);border-right-color:var(--red)}

/* LIGHTBOX */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:2000;display:none;align-items:center;justify-content:center}
#lightbox.show{display:flex}
#lightbox img{max-width:90vw;max-height:90vh;border-radius:6px;object-fit:contain}
#lightbox-close{position:absolute;top:1rem;right:1rem;background:rgba(255,255,255,0.15);color:white;border:none;border-radius:50%;width:36px;height:36px;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>

<nav>
  <a class="logo" href="#">
    <span><span class="red">Zero</span>Stars</span>
  </a>
  <span class="hint"><i class="ti ti-mouse-2" style="font-size:11px"></i> Right-click map to pin a location &nbsp;·&nbsp; Search to navigate</span>
</nav>

<div id="map"></div>

<!-- RIGHT-CLICK CONTEXT MENU -->
<div id="ctx-menu">
  <button class="ctx-red" onclick="openAddPin()"><i class="ti ti-map-pin-plus"></i> Pin this location</button>
  <button onclick="closeCtxMenu()"><i class="ti ti-x"></i> Cancel</button>
</div>

<!-- ADD PIN MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-head">
      <h3><i class="ti ti-map-pin-plus" style="color:var(--red);margin-right:6px"></i>Pin a Zero-Star Location</h3>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-coords" id="modalCoords"></div>
    <div class="modal-body">
      <div class="field">
        <label>Location name</label>
        <input type="text" id="pinName" placeholder="e.g. Apex Staffing, 123 Main St">
      </div>
      <div class="field">
        <label>Category</label>
        <select id="pinCat">
          <option value="Employer">Employer / Workplace</option>
          <option value="Landlord">Landlord / Property</option>
          <option value="Service">Service / Business</option>
          <option value="Product">Product</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="field">
        <label>Why does this deserve zero stars?</label>
        <textarea id="pinDesc" placeholder="Be specific: dates, amounts, what happened, outcome…"></textarea>
      </div>
      <div class="field">
        <label>Photos <span style="font-weight:400;text-transform:none;letter-spacing:0;font-family:'DM Sans',sans-serif;font-size:0.72rem;color:#aaa">(optional — EXIF location extracted)</span></label>
        <div class="photo-drop" id="photoDrop">
          <input type="file" id="photoInput" accept="image/*" multiple onchange="handlePhotos(this.files)">
          <i class="ti ti-photo-up"></i>
          <span>Tap to upload photos</span>
          <div class="geo-tag" id="geoTagMsg"></div>
        </div>
        <div class="photo-preview" id="photoPreview"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-red" onclick="submitPin()"><i class="ti ti-map-pin" style="margin-right:5px"></i>Pin it</button>
      </div>
    </div>
  </div>
</div>

<!-- PIN VIEW POPUP -->
<div class="pin-popup" id="pinPopup">
  <div class="popup-handle"></div>
  <button class="popup-close-btn" onclick="closePopup()"><i class="ti ti-x"></i></button>
  <div class="popup-cat" id="popupCat"></div>
  <div class="popup-title" id="popupTitle"></div>
  <div class="popup-desc" id="popupDesc"></div>
  <div class="popup-photos" id="popupPhotos"></div>
  <div class="popup-coords" id="popupCoords"></div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()"><i class="ti ti-x"></i></button>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let map, ctxLatLng = null;
const userPins = [];
let pendingPhotos = []; // [{dataUrl, lat, lng, hasGeo}]

// ── Seed pins ──────────────────────────────────────────────────────────────
const seedPins = [
  {title:'Apex Staffing Solutions', cat:'Employer', desc:'Held paychecks, deducted unexplained fees from final check.', lat:40.7128, lng:-74.0060, photos:[]},
  {title:'Pearl St. Properties LLC', cat:'Landlord', desc:'No heat for 6 weeks in January. Health inspector cited the property.', lat:51.5074, lng:-0.1278, photos:[]},
  {title:'QuickFix HVAC & Electric', cat:'Service', desc:'Quoted $400, charged $1,800, left job unfinished.', lat:-37.8136, lng:144.9631, photos:[]},
  {title:'NordHome Air Purifier Pro', cat:'Product', desc:'Failed in 3 weeks. Warranty refused. Thousands of similar complaints.', lat:48.8566, lng:2.3522, photos:[]},
  {title:'Lakeview Realty Group', cat:'Landlord', desc:'Kept $2,400 deposit; provided fabricated damage receipts.', lat:35.6762, lng:139.6503, photos:[]},
];

// ── Map init ───────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  map = L.map('map', {zoomControl:true}).setView([20, 0], 2);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom:19
  }).addTo(map);

  // Leaflet Geocoder (OpenStreetMap Nominatim)
  const geocoder = L.Control.geocoder({
    defaultMarkGeocode: false,
    placeholder: 'Search anywhere…',
    geocoder: L.Control.Geocoder.nominatim(),
    position: 'topleft',
    collapsed: false,
    errorMessage: 'Not found'
  })
  .on('markgeocode', e => {
    const bb = e.geocode.bbox;
    map.fitBounds([[bb.getSouthWest().lat, bb.getSouthWest().lng],[bb.getNorthEast().lat, bb.getNorthEast().lng]]);
  })
  .addTo(map);

  // Seed pins
  seedPins.forEach(p => addPinToMap(p));

  // Right-click / long-press
  map.on('contextmenu', e => {
    e.originalEvent.preventDefault();
    ctxLatLng = e.latlng;
    showCtxMenu(e.originalEvent.clientX, e.originalEvent.clientY);
  });

  // Close ctx menu on map click
  map.on('click', () => closeCtxMenu());

  // Close popup on map click
  map.on('click', () => closePopup());

  // Long-press for mobile
  let pressTimer;
  map.on('mousedown touchstart', e => {
    const orig = e.originalEvent;
    if (orig.touches && orig.touches.length > 1) return;
    pressTimer = setTimeout(() => {
      if (e.latlng) {
        ctxLatLng = e.latlng;
        const t = orig.touches ? orig.touches[0] : orig;
        showCtxMenu(t.clientX, t.clientY);
      }
    }, 600);
  });
  map.on('mouseup touchend mousemove touchmove', () => clearTimeout(pressTimer));

  document.addEventListener('click', e => {
    if (!document.getElementById('ctx-menu').contains(e.target)) closeCtxMenu();
  });
});

// ── Context menu ───────────────────────────────────────────────────────────
function showCtxMenu(x, y) {
  const menu = document.getElementById('ctx-menu');
  menu.style.display = 'block';
  const mw = menu.offsetWidth || 180, mh = menu.offsetHeight || 80;
  const vw = window.innerWidth, vh = window.innerHeight;
  menu.style.left = Math.min(x, vw - mw - 8) + 'px';
  menu.style.top  = Math.min(y, vh - mh - 8) + 'px';
}
function closeCtxMenu() {
  document.getElementById('ctx-menu').style.display = 'none';
}

// ── Add pin modal ──────────────────────────────────────────────────────────
function openAddPin() {
  closeCtxMenu();
  if (!ctxLatLng) return;
  document.getElementById('modalCoords').textContent =
    `📍 ${ctxLatLng.lat.toFixed(5)}, ${ctxLatLng.lng.toFixed(5)}`;
  document.getElementById('pinName').value = '';
  document.getElementById('pinDesc').value = '';
  document.getElementById('pinCat').value = 'Employer';
  document.getElementById('photoPreview').innerHTML = '';
  document.getElementById('geoTagMsg').style.display = 'none';
  pendingPhotos = [];
  document.getElementById('addModal').classList.add('show');
  setTimeout(() => document.getElementById('pinName').focus(), 200);
}
function closeModal() {
  document.getElementById('addModal').classList.remove('show');
}

// ── Photo handling + EXIF geo ──────────────────────────────────────────────
function handlePhotos(files) {
  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const dataUrl = e.target.result;
      extractExifGeo(file, (lat, lng) => {
        const hasGeo = lat !== null;
        pendingPhotos.push({dataUrl, lat, lng, hasGeo});
        renderPhotoPreview();
        if (hasGeo) {
          const msg = document.getElementById('geoTagMsg');
          msg.textContent = `📍 GPS found in photo: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
          msg.style.display = 'block';
        }
      });
    };
    reader.readAsDataURL(file);
  });
  // Reset input so same file can be re-selected
  document.getElementById('photoInput').value = '';
}

function extractExifGeo(file, cb) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const view = new DataView(e.target.result);
      // Check JPEG marker
      if (view.getUint16(0) !== 0xFFD8) { cb(null, null); return; }
      let offset = 2;
      while (offset < view.byteLength - 2) {
        if (view.getUint16(offset) === 0xFFE1) { // APP1 = EXIF
          const exifOffset = offset + 4;
          const exifStr = String.fromCharCode(...new Uint8Array(e.target.result, exifOffset, 4));
          if (exifStr === 'Exif') {
            const tiffOffset = exifOffset + 6;
            const bigEndian = view.getUint16(tiffOffset) === 0x4D4D;
            const getU16 = o => bigEndian ? view.getUint16(o) : view.getUint16(o, true);
            const getU32 = o => bigEndian ? view.getUint32(o) : view.getUint32(o, true);
            const ifdOffset = tiffOffset + getU32(tiffOffset + 4);
            const entryCount = getU16(ifdOffset);
            let gpsIFDOffset = null;
            for (let i = 0; i < entryCount; i++) {
              const entryOffset = ifdOffset + 2 + i * 12;
              if (getU16(entryOffset) === 0x8825) {
                gpsIFDOffset = tiffOffset + getU32(entryOffset + 8);
                break;
              }
            }
            if (!gpsIFDOffset) { cb(null, null); return; }
            const gpsEntryCount = getU16(gpsIFDOffset);
            const gpsData = {};
            for (let i = 0; i < gpsEntryCount; i++) {
              const eo = gpsIFDOffset + 2 + i * 12;
              const tag = getU16(eo), type = getU16(eo+2), count = getU32(eo+4);
              const valOffset = tiffOffset + getU32(eo+8);
              if (type === 5 && count === 3) { // RATIONAL x3 = deg/min/sec
                const deg = getU32(valOffset) / getU32(valOffset+4);
                const min = getU32(valOffset+8) / getU32(valOffset+12);
                const sec = getU32(valOffset+16) / getU32(valOffset+20);
                gpsData[tag] = deg + min/60 + sec/3600;
              } else if (type === 2) { // ASCII ref
                gpsData['ref'+tag] = String.fromCharCode(view.getUint8(eo+8));
              }
            }
            // Tag 1=LatRef,2=Lat,3=LonRef,4=Lon
            if (gpsData[2] !== undefined && gpsData[4] !== undefined) {
              const lat = gpsData['ref1'] === 'S' ? -gpsData[2] : gpsData[2];
              const lng = gpsData['ref3'] === 'W' ? -gpsData[4] : gpsData[4];
              cb(lat, lng); return;
            }
          }
        }
        offset += 2 + view.getUint16(offset + 2);
      }
    } catch(_) {}
    cb(null, null);
  };
  reader.readAsArrayBuffer(file);
}

function renderPhotoPreview() {
  const preview = document.getElementById('photoPreview');
  preview.innerHTML = pendingPhotos.map((p, i) => `
    <div class="photo-thumb">
      <img src="${p.dataUrl}" alt="">
      ${p.hasGeo ? `<div class="geo-badge">GPS</div>` : ''}
      <button class="remove-photo" onclick="removePhoto(${i})"><i class="ti ti-x"></i></button>
    </div>`).join('');
}
function removePhoto(i) {
  pendingPhotos.splice(i, 1);
  renderPhotoPreview();
}

// ── Submit pin ─────────────────────────────────────────────────────────────
function submitPin() {
  const name = document.getElementById('pinName').value.trim();
  const desc = document.getElementById('pinDesc').value.trim();
  const cat  = document.getElementById('pinCat').value;
  if (!name) { document.getElementById('pinName').focus(); return; }
  if (!ctxLatLng) return;

  // If any photo has GPS and it differs, use it or offer it — here we always use the right-click location
  const pin = {
    title: name, cat, desc,
    lat: ctxLatLng.lat, lng: ctxLatLng.lng,
    photos: pendingPhotos.map(p => ({dataUrl: p.dataUrl, hasGeo: p.hasGeo, lat: p.lat, lng: p.lng}))
  };

  addPinToMap(pin);
  closeModal();
  // Pan to new pin
  map.flyTo([pin.lat, pin.lng], Math.max(map.getZoom(), 13), {duration:0.6});
  setTimeout(() => showPinPopup(pin), 700);
}

// ── Add pin marker to map ──────────────────────────────────────────────────
function addPinToMap(pin) {
  userPins.push(pin);
  const label = pin.title.split(/[\s,]/)[0];
  const icon = L.divIcon({
    className:'',
    html:`<div class="zs-pin">${label}</div>`,
    iconSize:[null,null], iconAnchor:[0,28]
  });
  const marker = L.marker([pin.lat, pin.lng], {icon}).addTo(map);
  marker.on('click', e => {
    L.DomEvent.stopPropagation(e);
    showPinPopup(pin);
  });
}

// ── Pin popup ──────────────────────────────────────────────────────────────
function showPinPopup(pin) {
  document.getElementById('popupCat').textContent = pin.cat;
  document.getElementById('popupTitle').textContent = pin.title;
  document.getElementById('popupDesc').textContent = pin.desc || 'No description provided.';
  document.getElementById('popupCoords').textContent = `${pin.lat.toFixed(5)}, ${pin.lng.toFixed(5)}`;

  const photosEl = document.getElementById('popupPhotos');
  if (pin.photos && pin.photos.length) {
    photosEl.innerHTML = pin.photos.map(p =>
      `<img src="${p.dataUrl}" alt="" onclick="openLightbox('${p.dataUrl}')" title="${p.hasGeo ? '📍 Geotagged photo' : 'Photo'}">`
    ).join('');
    photosEl.style.display = 'flex';
  } else {
    photosEl.innerHTML = '';
    photosEl.style.display = 'none';
  }

  document.getElementById('pinPopup').classList.add('show');
}
function closePopup() {
  document.getElementById('pinPopup').classList.remove('show');
}

// ── Lightbox ───────────────────────────────────────────────────────────────
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
}

// Drag-over styling for photo drop zone
const drop = document.getElementById('photoDrop');
if (drop) {
  drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
  drop.addEventListener('drop', e => {
    e.preventDefault();
    drop.classList.remove('drag');
    handlePhotos(e.dataTransfer.files);
  });
}
</script>
</body>
</html>
